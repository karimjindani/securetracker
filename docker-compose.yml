services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: securetracker
      POSTGRES_PASSWORD: securetracker
      POSTGRES_DB: securetracker
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: securetracker
      MINIO_ROOT_PASSWORD: securetracker-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  smtp-test-service:
    image: axllent/mailpit:v1.25
    ports:
      - "1025:1025"
      - "8025:8025"

  backend-api:
    build:
      context: .
      target: backend
    env_file:
      - .env.example
    depends_on:
      - postgres
      - keycloak
      - minio
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  minio-data:
