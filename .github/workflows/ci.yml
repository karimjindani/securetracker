name: CI

on:
  push:
    branches: ["main", "codex/**", "feat/**", "fix/**", "docs/**", "ci/**", "chore/**", "refactor/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate database client
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Docker Compose config
        run: docker compose config --quiet

      - name: Production Docker Compose config
        run: docker compose -f docker-compose.prod.yml config --quiet

      - name: Build backend image
        run: docker build --target backend -t securetracker-backend:${{ github.sha }} .

      - name: Build frontend image
        run: docker build --target frontend -t securetracker-frontend:${{ github.sha }} .

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    runs-on: ubuntu-latest
    needs: verify
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image for scan
        run: docker build --target backend -t securetracker-backend:${{ github.sha }} .

      - name: Trivy backend image scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: securetracker-backend:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
